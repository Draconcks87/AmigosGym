<style>
:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--bg4:#2e2e2e;
  --border:#333;--border2:#444;
  --text:#f0f0f0;--text2:#aaa;--text3:#666;
  --green:#1D9E75;--green-dark:#0F6E56;
  --red:#E24B4A;--blue:#378ADD;--amber:#BA7517;--purple:#8B5CF6;
  --radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
#app{display:flex;flex-direction:column;height:100%}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.screen-inner{padding:1rem;padding-bottom:6rem;max-width:480px;margin:0 auto}
.bottom-nav{display:flex;background:var(--bg2);border-top:0.5px solid var(--border);padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;border:none;background:none;color:var(--text3);font-size:10px;cursor:pointer}
.nav-btn.active{color:var(--green)}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:2rem 1.5rem}
.auth-logo{font-size:56px;margin-bottom:.5rem}
.auth-title{font-size:26px;font-weight:700;margin-bottom:4px}
.auth-sub{font-size:14px;color:var(--text2);margin-bottom:2.5rem;text-align:center}
.auth-card{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:360px}
.auth-card h2{font-size:17px;font-weight:600;margin-bottom:1.25rem}
.field{margin-bottom:.875rem}
.field label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select,.field textarea{width:100%;padding:12px 14px;border:.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg3);color:var(--text);font-size:15px;outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green)}
.field textarea{resize:vertical;min-height:70px}
.btn-primary{width:100%;padding:14px;background:var(--green);border:none;border-radius:var(--radius-sm);color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.btn-primary:active{background:var(--green-dark)}
.btn-secondary{width:100%;padding:13px;background:transparent;border:.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text2);font-size:15px;cursor:pointer;margin-top:8px}
.btn-link{background:none;border:none;color:var(--green);font-size:14px;cursor:pointer;text-decoration:underline}
.btn-icon{background:none;border:none;color:var(--text2);cursor:pointer;padding:6px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center}
.btn-green-sm{background:var(--green);border:none;border-radius:var(--radius-sm);color:#fff;font-size:13px;font-weight:600;padding:8px 14px;cursor:pointer}
.btn-outline-sm{background:none;border:.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text2);font-size:13px;padding:8px 14px;cursor:pointer}
.msg-err{font-size:13px;color:var(--red);margin-top:8px;text-align:center}
.msg-ok{font-size:13px;color:var(--green);margin-top:8px;text-align:center}
.auth-switch{text-align:center;margin-top:1rem;font-size:13px;color:var(--text2)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 1rem;background:var(--bg);border-bottom:.5px solid var(--border);padding-top:calc(12px + env(safe-area-inset-top))}
.topbar-title{font-size:17px;font-weight:700}
.avatar{width:34px;height:34px;border-radius:50%;background:#0F6E56;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.card{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.125rem;margin-bottom:.75rem}
.card-title{font-size:15px;font-weight:600;margin-bottom:.875rem}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem}
.muscle-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.muscle-card{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer}
.muscle-card:active{border-color:var(--green);transform:scale(.98)}
.muscle-emoji-box{width:100%;height:80px;display:flex;align-items:center;justify-content:center;font-size:40px;background:var(--bg3)}
.muscle-name{padding:8px 10px;font-size:14px;font-weight:600;text-align:center}
.muscle-count{padding-bottom:8px;font-size:11px;text-align:center;color:var(--text3)}
.ex-list{display:flex;flex-direction:column;gap:8px}
.ex-item{display:flex;align-items:center;gap:12px;background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;cursor:pointer}
.ex-item:active{border-color:var(--green);background:var(--bg3)}
.ex-emoji{width:42px;height:42px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-meta{font-size:12px;color:var(--text3);margin-top:2px}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;margin-right:4px;text-transform:uppercase;letter-spacing:.3px}
.badge-green{background:#0a3d2e;color:#4ade80}
.badge-blue{background:#0a1f3d;color:#60a5fa}
.badge-amber{background:#3d2200;color:#fbbf24}
.badge-purple{background:#2d1b69;color:#c4b5fd}
.badge-red{background:#3d0a0a;color:#f87171}
.chevron{color:var(--text3);flex-shrink:0}
.ex-detail-img{width:100%;height:180px;object-fit:cover;border-radius:var(--radius-sm);margin-bottom:1rem}
.ex-detail-img-fallback{width:100%;height:100px;display:flex;align-items:center;justify-content:center;font-size:64px;background:var(--bg3);border-radius:var(--radius-sm);margin-bottom:1rem}
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem}
.tag{background:var(--bg3);border:.5px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--text2)}
.series-table{width:100%;border-collapse:collapse;margin-bottom:.75rem}
.series-table th{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:4px 8px;text-align:center;font-weight:500}
.series-table td{padding:4px 4px}
.series-table input{width:100%;padding:10px 6px;background:var(--bg3);border:.5px solid var(--border2);border-radius:8px;color:var(--text);font-size:15px;text-align:center;outline:none}
.series-table input:focus{border-color:var(--green)}
.add-serie-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;border:.5px dashed var(--border2);border-radius:var(--radius-sm);background:none;color:var(--text3);font-size:14px;cursor:pointer;margin-bottom:1rem}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.stat-box{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 8px;text-align:center}
.stat-num{font-size:24px;font-weight:700;color:var(--green)}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.hist-session{border-left:3px solid var(--green);padding:8px 12px;margin-bottom:12px;background:var(--bg2);border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.hist-date{font-size:11px;color:var(--text3);margin-bottom:3px}
.hist-exname{font-size:14px;font-weight:600}
.hist-series{font-size:12px;color:var(--text2);margin-top:3px}
.hist-note{font-size:12px;color:var(--text3);margin-top:4px;font-style:italic}
.back-btn{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--text2);background:none;border:none;cursor:pointer;padding:0;margin-bottom:1rem}
.search-wrap{position:relative;margin-bottom:.875rem}
.search-wrap input{width:100%;padding:11px 14px 11px 38px;background:var(--bg3);border:.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;outline:none}
.search-wrap input:focus{border-color:var(--green)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px}
.empty-state .emoji{font-size:40px;margin-bottom:.75rem}
.filter-select{width:100%;padding:10px 14px;background:var(--bg3);border:.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;margin-bottom:.875rem;-webkit-appearance:none;outline:none}
.section-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.sync-box{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:.75rem}
.sync-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.sync-btns{display:flex;gap:8px}
.sync-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:11px 8px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;border:none}
.sync-btn.export{background:var(--green);color:#fff}
.sync-btn.import{background:var(--bg3);border:.5px solid var(--border2);color:var(--text2)}
.sync-hint{font-size:12px;color:var(--text3);margin-top:8px}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:.75rem}
.chip{padding:6px 12px;border-radius:20px;font-size:13px;cursor:pointer;border:.5px solid var(--border2);background:var(--bg3);color:var(--text2)}
.chip.selected{background:var(--green);border-color:var(--green);color:#fff;font-weight:600}
.cardio-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.cardio-card{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--radius);padding:1rem;cursor:pointer;text-align:center}
.cardio-card:active{border-color:var(--red);transform:scale(.98)}
.cardio-emoji{font-size:36px;margin-bottom:6px}
.cardio-name{font-size:13px;font-weight:600}
.cardio-count{font-size:11px;color:var(--text3);margin-top:2px}

</head>

function loadDB(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'null')||{users:[],sessions:[]}}catch{return{users:[],sessions:[]}}}
function saveDB(){localStorage.setItem(STORAGE_KEY,JSON.stringify(db))}
function saveSession(){if(currentUser) localStorage.setItem(STORAGE_KEY+'_session',currentUser.id)}
function loadSession(){
  const sid=localStorage.getItem(STORAGE_KEY+'_session');
  if(!sid) return null;
  const d=loadDB();
  return d.users.find(u=>u.id===sid)||null;
}
function clearSession(){localStorage.removeItem(STORAGE_KEY+'_session')}
db=loadDB();
// Migrate old keys if needed
['amigosgym_v1','amigosgym_v2'].forEach(oldKey=>{
  try{
    const old=JSON.parse(localStorage.getItem(oldKey)||'null');
    if(old&&old.users&&old.users.length){
      if(!db.users.length) db.users=old.users;
      const existIds=new Set(db.sessions.map(s=>s.id));
      (old.sessions||[]).forEach(s=>{if(!existIds.has(s.id))db.sessions.push(s)});
      saveDB();
    }
  }catch(e){}
});

      <div class="field"><label>Respuesta secreta</label><input id="a-respuesta" type="text" placeholder="Tu respuesta" autocomplete="off" autocorrect="off"></div>`:''}
      <button class="btn-primary" onclick="doAuth()">${r?'Registrarse':'Entrar'}</button>
      <div id="auth-msg"></div>

        ?`¿Ya tenés cuenta? <button class="btn-link" onclick="toggleMode()">Iniciar sesión</button>`

      </div>

      ${!r?`<div style="text-align:center;margin-top:.25rem"><button class="btn-link" style="font-size:12px;color:var(--text3)" onclick="showAdmin()">Panel de administrador</button></div>`:''}
    </div>
  </div></div>`;
}
function toggleMode(){S.authMode=S.authMode==='login'?'register':'login';render()}
function doAuth(){
  const msg=document.getElementById('auth-msg');
  const user=(document.getElementById('a-user').value||'').trim().toLowerCase();
  const pass=document.getElementById('a-pass').value||'';
  if(!user||!pass){msg.innerHTML='<div class="msg-err">Completá todos los campos</div>';return}
  if(S.authMode==='register'){
    const name=(document.getElementById('a-name').value||'').trim();
    const pass2=document.getElementById('a-pass2').value||'';
    if(!name){msg.innerHTML='<div class="msg-err">Ingresá tu nombre</div>';return}
    if(pass!==pass2){msg.innerHTML='<div class="msg-err">Las contraseñas no coinciden</div>';return}
    if(db.users.find(u=>u.username===user)){msg.innerHTML='<div class="msg-err">Ese usuario ya existe</div>';return}
    const pregunta=document.getElementById('a-pregunta')?.value||'';
    const respuesta=(document.getElementById('a-respuesta')?.value||'').trim().toLowerCase();
    if(!pregunta){msg.innerHTML='<div class="msg-err">Elegí una pregunta de seguridad</div>';return}
    if(!respuesta){msg.innerHTML='<div class="msg-err">Escribí tu respuesta secreta</div>';return}
    const nu={id:'u'+Date.now(),username:user,password:pass,name,pregunta,respuesta,customExercises:[]};
    db.users.push(nu);saveDB();currentUser=nu;saveSession();
    msg.innerHTML='<div class="msg-ok">✓ Cuenta creada</div>';
    setTimeout(()=>{S.screen='main';render()},600);
  } else {
    const f=db.users.find(u=>u.username===user&&u.password===pass);
    if(!f){msg.innerHTML='<div class="msg-err">Usuario o contraseña incorrectos</div>';return}
    currentUser=f;saveSession();S.screen='main';render();
  }
}

function serieRow(s,i,cfg){
  return`<tr>

  </tr>`;
}
function addSerie(){S.logSeries.push({});const ex=findEx(S.exercise,S.exMuscle);const isCardio=(S.exMuscle==='cardio')||(ex&&ex.muscGroups&&ex.muscGroups.includes('cardio'));const cfg=isCardio?LOG_TYPE.cardio:LOG_TYPE.default;document.getElementById('series-tbody').innerHTML=S.logSeries.map((s,i)=>serieRow(s,i,cfg)).join('')}
function removeSerie(i){S.logSeries.splice(i,1);const ex=findEx(S.exercise,S.exMuscle);const isCardio=(S.exMuscle==='cardio')||(ex&&ex.muscGroups&&ex.muscGroups.includes('cardio'));const cfg=isCardio?LOG_TYPE.cardio:LOG_TYPE.default;document.getElementById('series-tbody').innerHTML=S.logSeries.map((s,i)=>serieRow(s,i,cfg)).join('')}
function saveLog(){
  const notas=document.getElementById('log-notas')?.value||'';
  const ex=findEx(S.exercise,S.exMuscle);
  const isCardio=(S.exMuscle==='cardio')||(ex&&ex.muscGroups&&ex.muscGroups.includes('cardio'));
  const series=S.logSeries.filter(s=>Object.values(s).some(v=>v));
  if(!series.length){document.getElementById('log-msg').innerHTML='<span class="msg-err">Completá al menos una fila</span>';return}
  db.sessions.push({id:'s'+Date.now(),userId:currentUser.id,exerciseId:S.exercise,muscGrupo:S.exMuscle,logType:isCardio?'cardio':'default',fecha:new Date().toLocaleDateString('es-AR',{year:'numeric',month:'long',day:'numeric'}),series,notas});
  saveDB();
  document.getElementById('log-msg').innerHTML='<span class="msg-ok">✓ Sesión guardada</span>';
  setTimeout(()=>{S.tab='historial';S.exercise=null;S.logSeries=[];S.logNotas='';render()},800);
}
function formatSerie(sr,i,type){
  if(type==='cardio') return`S${i+1}: ${sr.km?sr.km+'km ':''} ${sr.min?sr.min+'min ':''} ${sr.vel?sr.vel+'km/h':''}`.trim();
  return`S${i+1}: ${sr.peso?sr.peso+'kg':'-'} × ${sr.reps||'-'}${sr.tiempo?' / '+sr.tiempo+'s':''}`;
}

// HISTORIAL
function renderHistorial(){
  const sessions=userSessions().slice().reverse();
  const all=allExercises();
  const filtered=S.histFilter==='all'?sessions:sessions.filter(s=>s.muscGrupo===S.histFilter||(findEx(s.exerciseId,s.muscGrupo)?.muscGroups||[]).includes(S.histFilter));
  const muscSet=new Set(sessions.map(s=>s.muscGrupo).filter(Boolean));
  const totalSeries=sessions.reduce((a,s)=>a+(s.series?.length||0),0);
  return`
  <div class="stats-row">
    <div class="stat-box"><div class="stat-num">${sessions.length}</div><div class="stat-lbl">Sesiones</div></div>
    <div class="stat-box"><div class="stat-num">${totalSeries}</div><div class="stat-lbl">Series</div></div>
    <div class="stat-box"><div class="stat-num">${muscSet.size}</div><div class="stat-lbl">Músculos</div></div>
  </div>
  <div class="sync-box">
    <div class="sync-title">🔄 Sincronizar entre dispositivos</div>
    <div class="sync-btns">
      <button class="sync-btn export" onclick="exportData()">${ic('download')} Exportar</button>
      <button class="sync-btn import" onclick="importData()">${ic('upload')} Importar</button>
    </div>
    <div class="sync-hint">Exportá desde un dispositivo → pasá el archivo por WhatsApp o Drive → importalo en el otro.</div>
    <div id="sync-msg"></div>
  </div>
  <select class="filter-select" onchange="S.histFilter=this.value;refreshTab()">
    <option value="all" ${S.histFilter==='all'?'selected':''}>Todos los grupos</option>
    ${MUSCULOS.map(m=>`<option value="${m.id}" ${S.histFilter===m.id?'selected':''}>${m.emoji} ${m.name}</option>`).join('')}
  </select>
  ${filtered.length===0?`<div class="empty-state"><div class="emoji">📋</div>${sessions.length===0?'Sin registros aún. ¡Empezá a entrenar!':'Sin sesiones para este grupo'}</div>`:''}
  ${filtered.map(s=>{
    const ex=all.find(e=>e.id===s.exerciseId);
    return`<div class="hist-session" style="${s.logType==='cardio'?'border-color:var(--red)':''}">
      <div class="hist-date">${s.fecha}</div>
      <div class="hist-exname">${ex?.name||'Ejercicio'}</div>
      <div class="hist-series">${(s.series||[]).map((sr,i)=>formatSerie(sr,i,s.logType)).join(' · ')}</div>
      ${s.notas?`<div class="hist-note">${s.notas}</div>`:''}
    </div>`;
  }).join('')}`;
}

let selectedMuscleChips=[];
function toggleMuscleChip(id,el){
  if(selectedMuscleChips.includes(id)){
    selectedMuscleChips=selectedMuscleChips.filter(x=>x!==id);
    el.classList.remove('selected');
  } else {
    selectedMuscleChips.push(id);
    el.classList.add('selected');
  }
}
function showAddForm(){selectedMuscleChips=[];document.getElementById('add-form-wrap').style.display='block';document.querySelectorAll('#cx-muscle-chips .chip').forEach(c=>c.classList.remove('selected'))}
function saveCustom(){
  const name=(document.getElementById('cx-name').value||'').trim();
  if(!name){document.getElementById('cx-msg').innerHTML='<div class="msg-err">El nombre es obligatorio</div>';return}
  if(!selectedMuscleChips.length){document.getElementById('cx-msg').innerHTML='<div class="msg-err">Elegí al menos un grupo muscular</div>';return}
  if(!currentUser.customExercises) currentUser.customExercises=[];
  currentUser.customExercises.push({id:'cx'+Date.now(),name,muscGroups:selectedMuscleChips,muscGrupo:selectedMuscleChips[0],nivel:document.getElementById('cx-nivel').value,equipo:document.getElementById('cx-equipo').value,notas:document.getElementById('cx-notas').value.trim()});
  syncUser();saveDB();refreshTab();
}
function deleteCustom(id){
  if(!confirm('¿Eliminar este ejercicio?')) return;
  currentUser.customExercises=(currentUser.customExercises||[]).filter(e=>e.id!==id);
  syncUser();saveDB();refreshTab();
}

// EXPORT / IMPORT
function exportData(){
  const payload={version:2,user:{id:currentUser.id,username:currentUser.username,name:currentUser.name,customExercises:currentUser.customExercises||[]},sessions:userSessions()};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`amigosgym_${currentUser.username}_${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(url);
}
function importData(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const imp=JSON.parse(ev.target.result);
        if(!imp.sessions) throw new Error('Archivo inválido');
        const existIds=new Set((db.sessions||[]).map(s=>s.id));
        // Reasign userId to current user so sessions show up on this device
        const newS=imp.sessions
          .filter(s=>!existIds.has(s.id))
          .map(s=>({...s, userId:currentUser.id}));
        db.sessions=[...(db.sessions||[]),...newS];
        if(imp.user?.customExercises?.length){
          const existCx=new Set((currentUser.customExercises||[]).map(e=>e.id));
          const newCx=imp.user.customExercises.filter(e=>!existCx.has(e.id));
          currentUser.customExercises=[...(currentUser.customExercises||[]),...newCx];
          syncUser();
        }
        saveDB();
        const msg=document.getElementById('sync-msg');
        if(msg) msg.innerHTML=`<div class="msg-ok" style="margin-top:8px">✓ ${newS.length} sesiones nuevas importadas</div>`;
        setTimeout(()=>refreshTab(),1200);
      }catch(err){
        const msg=document.getElementById('sync-msg');
        if(msg) msg.innerHTML='<div class="msg-err" style="margin-top:8px">Archivo inválido o corrupto</div>';
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// HELPERS
function allExercises(){return[...Object.values(EJERCICIOS).flat(),...(currentUser.customExercises||[])]}
function userSessions(){return(db.sessions||[]).filter(s=>s.userId===currentUser.id)}
function findEx(id,musc){
  if(!id) return null;
  const base=musc?(EJERCICIOS[musc]||[]).find(e=>e.id===id):null;
  if(base) return base;
  const fromAll=Object.values(EJERCICIOS).flat().find(e=>e.id===id);
  if(fromAll) return fromAll;
  return(currentUser?.customExercises||[]).find(e=>e.id===id);
}
function syncUser(){const i=db.users.findIndex(u=>u.id===currentUser.id);if(i>=0)db.users[i]=currentUser}
function selectMuscle(id){S.muscle=id;S.searchQ='';refreshTab()}
function selectEx(id,musc){S.exercise=id;S.exMuscle=musc;refreshTab()}
function goBack(){
  if(S.exercise){S.exercise=null;S.exMuscle=null;}
  else{S.muscle=null;}
  refreshTab();
}
function goToLog(id,musc){S.tab='registrar';S.exercise=id;S.exMuscle=musc;S.logSeries=[{}];S.logNotas='';render()}

function buscarUsuarios(){
  const q=(document.getElementById('rec-name').value||'').trim().toLowerCase();
  if(!q){document.getElementById('rec-results').innerHTML='<div class="msg-err">Escribí al menos un nombre</div>';return}
  const found=db.users.filter(u=>u.name.toLowerCase().includes(q)||u.username.toLowerCase().includes(q));
  if(!found.length){document.getElementById('rec-results').innerHTML='<div class="msg-err">No se encontró ningún usuario</div>';return}
  document.getElementById('rec-results').innerHTML=found.map(u=>`
    <div style="background:var(--bg3);border:.5px solid var(--border2);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px">
      <div style="font-size:15px;font-weight:600;margin-bottom:4px">👤 ${u.name}</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:8px">Usuario: <strong style="color:var(--green)">${u.username}</strong></div>
      ${u.pregunta?`<button class="btn-outline-sm" onclick="mostrarPregunta('${u.id}')" style="width:100%">Resetear contraseña</button>`:'<div style="font-size:12px;color:var(--text3)">Sin pregunta de seguridad configurada</div>'}
    </div>`).join('');
}
function mostrarPregunta(uid){
  const u=db.users.find(x=>x.id===uid);
  if(!u||!u.pregunta) return;
  document.getElementById('rec-results').innerHTML=`
    <div style="background:var(--bg3);border:.5px solid var(--border2);border-radius:var(--radius-sm);padding:12px">
      <div style="font-size:14px;font-weight:600;margin-bottom:4px">👤 ${u.name} · <span style="color:var(--green)">${u.username}</span></div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:8px">❓ ${u.pregunta}</div>
      <div class="field"><label>Tu respuesta</label><input id="rec-resp" type="text" placeholder="Respuesta secreta" autocorrect="off"></div>
      <div class="field"><label>Nueva contraseña</label><input id="rec-newpass" type="password" placeholder="Nueva contraseña"></div>
      <div class="field"><label>Repetir contraseña</label><input id="rec-newpass2" type="password" placeholder="Repetir"></div>
      <button class="btn-primary" onclick="resetearPass('${uid}')">Cambiar contraseña</button>
      <div id="rec-msg"></div>
    </div>`;
}
function resetearPass(uid){
  const u=db.users.find(x=>x.id===uid);
  const resp=(document.getElementById('rec-resp').value||'').trim().toLowerCase();
  const np=document.getElementById('rec-newpass').value||'';
  const np2=document.getElementById('rec-newpass2').value||'';
  const msg=document.getElementById('rec-msg');
  if(resp!==u.respuesta){msg.innerHTML='<div class="msg-err">Respuesta incorrecta</div>';return}
  if(!np||np.length<3){msg.innerHTML='<div class="msg-err">La contraseña debe tener al menos 3 caracteres</div>';return}
  if(np!==np2){msg.innerHTML='<div class="msg-err">Las contraseñas no coinciden</div>';return}
  u.password=np;
  const idx=db.users.findIndex(x=>x.id===uid);
  if(idx>=0) db.users[idx]=u;
  saveDB();
  msg.innerHTML='<div class="msg-ok">✓ Contraseña actualizada. Ya podés iniciar sesión.</div>';
  setTimeout(()=>{S.authMode='login';render()},1500);
}

function checkAdminPin(){

function showCreateUser(){
  const w=document.getElementById('admin-create-wrap');
  if(w) w.style.display=w.style.display==='none'?'block':'none';
}
function adminCreateUser(){
  const name=(document.getElementById('adm-name').value||'').trim();
  const user=(document.getElementById('adm-user').value||'').trim().toLowerCase();
  const pass=document.getElementById('adm-pass').value||'';
  const msg=document.getElementById('adm-create-msg');
  if(!name||!user||!pass){msg.innerHTML='<div class="msg-err">Completá todos los campos</div>';return}
  if(db.users.find(u=>u.username===user)){msg.innerHTML='<div class="msg-err">Ese usuario ya existe</div>';return}
  db.users.push({id:'u'+Date.now(),username:user,password:pass,name,customExercises:[],pregunta:'',respuesta:''});

  msg.innerHTML='<div class="msg-ok">✓ Perfil creado</div>';

function adminResetPass(uid){
  const w=document.getElementById('reset-wrap-'+uid);

function adminDoReset(uid){
  const np=document.getElementById('reset-pass-'+uid).value||'';
  const msg=document.getElementById('reset-msg-'+uid);
  if(!np||np.length<3){msg.innerHTML='<div class="msg-err">Mínimo 3 caracteres</div>';return}

  if(idx>=0){db.users[idx].password=np;saveDB();msg.innerHTML='<div class="msg-ok">✓ Contraseña actualizada</div>';}
  setTimeout(()=>render(),800);

function adminDeleteUser(uid){

  db.sessions=(db.sessions||[]).filter(s=>s.userId!==uid);
